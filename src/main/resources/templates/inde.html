<!DOCTYPE html>
<html>
<head>
    <title>Student Management</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            color: white;
        }
        .container {
            margin-top: 100px;
        }
        input, button {
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: none;
        }
        button {
            background: #ff9800;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎓 Student Management System</h1>

    <input type="text" id="name" placeholder="Enter student name">
    <button onclick="addStudent()">Add Student</button>

    <h3 id="result"></h3>
</div>

<script>
function addStudent() {
    let name = document.getElementById("name").value;

    fetch("/add?name=" + name)
        .then(res => res.text())
        .then(data => {
            document.getElementById("result").innerText = data;
        });
}
</script>

</body>
</html>
